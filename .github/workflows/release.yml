# Build precompiled C API bundles (staticlib + header) per tag.
# Artifacts: rs_ctrl_os-<version>-glibc-{x86_64,aarch64}.tar.gz (no .so).
name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            slug: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            slug: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libzmq3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build staticlib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="dist-${{ matrix.slug }}"
          mkdir -p "$STAGE/include"
          cp "include/rs_ctrl_os.h" "$STAGE/include/"
          cp "target/${{ matrix.target }}/release/librs_ctrl_os.a" "$STAGE/"
          (cd "$STAGE" && sha256sum librs_ctrl_os.a include/rs_ctrl_os.h > SHA256SUMS)
          tar -czvf "rs_ctrl_os-${VERSION}-glibc-${{ matrix.slug }}.tar.gz" -C "$STAGE" \
            librs_ctrl_os.a include/rs_ctrl_os.h SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.slug }}
          path: rs_ctrl_os-*-glibc-${{ matrix.slug }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Collect bundles
        run: |
          mkdir -p upload
          find artifacts -name 'rs_ctrl_os-*.tar.gz' -exec cp -t upload/ {} +
          ls -la upload/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
