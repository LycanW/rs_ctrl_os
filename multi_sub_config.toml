[static_config]
my_id = "multi_sub"
host = "127.0.0.1"
port = 5561
is_master = false
publish_hz = 0
subscribe_hz = 500
dynamic_load_enable = true

[static_config.subscribers]
from_multi_pub = "multi_pub"
from_pub       = "pub_node"

# 可选：无多播时直连，注释掉则仅依赖 discovery
[static_config.static_nodes]
multi_pub = "127.0.0.1:5560"
pub_node  = "127.0.0.1:5555"

[dynamic]
